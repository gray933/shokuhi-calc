<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毎日の食費計算アプリ</title>
<style>
        /* 全体のベース設定 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f3f6; /* 少し優しいグレー */
            color: #333;
            margin: 0;
            padding: 16px; /* スマホの画面端に少し余白を作る */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* アプリのカード外枠 */
        .container {
            background-color: #ffffff;
            padding: 24px 20px;
            border-radius: 16px; /* 角を少し丸くしてモダンに */
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.15);
            width: 100%;
            max-width: 480px; /* パソコンで見た時も広がりすぎないように制限 */
            box-sizing: border-box;
        }

        h1 {
            font-size: 22px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 24px;
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
            color: #4a5568;
        }

        /* 入力欄とセレクトボックス（スマホでタップしやすいように大きく） */
        input, select {
            width: 100%;
            height: 48px; /* タップ領域を確保（48px以上がスマホの推奨値） */
            padding: 0 14px;
            font-size: 16px; /* ★超重要：16px未満にするとiPhoneで自動ズームされてしまうバグを防ぎます */
            border: 2px solid #e2e8f0; /* 枠線を少し太く見やすく */
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #fff;
            color: #333;
            -webkit-appearance: none; /* iOS特有の不自然なグラデーションを消す */
            appearance: none;
        }

        /* セレクトボックスの右側に矢印風のデザインを追加するための親要素 */
        .select-wrapper {
            position: relative;
        }
        /* 矢印アイコンの設置 */
        .select-wrapper::after {
            content: '▼';
            font-size: 10px;
            color: #a0aec0;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none; /* 矢印の上をタップしても反応するように */
        }

        /* 入力欄にフォーカスが当たった時のエフェクト */
        input:focus, select:focus {
            outline: none;
            border-color: #2ecc71;
            background-color: #fafbfc;
        }

        /* 計算ボタン（親指で押しやすい大きなボタン） */
        button {
            width: 100%;
            height: 52px; /* 押しやすい厚み */
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
            transition: background 0.2s, transform 0.1s;
            -webkit-tap-highlight-color: transparent; /* スマホでタップした時の青い影を消す */
        }

        /* ボタンを押した瞬間のへこむ動き（スマホの心地いい操作感用） */
        button:active {
            background-color: #27ae60;
            transform: scale(0.98); 
        }

        /* 結果表示エリア */
        .result-box {
            margin-top: 24px;
            padding: 20px;
            background-color: #eafaf1;
            border-radius: 12px;
            text-align: center;
            display: none;
            animation: fadeIn 0.3s ease-out; /* ふわっと表示させる演出 */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            margin-bottom: 12px;
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-title {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .result-value {
            font-size: 26px;
            font-weight: bold;
            color: #1e293b;
        }

        .sub-text {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
        }

        hr {
            border: 0;
            border-top: 1px dashed #a8e6cf;
            margin: 16px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>食費計算アプリ</h1>
    
    <div class="form-group">
        <label for="budget">今月の食費予算 (円)</label>
        <input type="number" id="budget" placeholder="例: 40000" min="0">
    </div>

    <div class="form-group">
        <label for="month">計算したい月</label>
        <select id="month">
            <option value="31">1月 (31日)</option>
            <option value="28">2月 (28日)</option>
            <option value="31">3月 (31日)</option>
            <option value="30">4月 (30日)</option>
            <option value="31">5月 (31日)</option>
            <option value="30">6月 (30日)</option>
            <option value="31">7月 (31日)</option>
            <option value="31">8月 (31日)</option>
            <option value="30">9月 (30日)</option>
            <option value="31">10月 (31日)</option>
            <option value="30">11月 (30日)</option>
            <option value="31">12月 (31日)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="meals">1日あたり何食分を計算する？</label>
        <select id="meals">
            <option value="3">3食すべて (朝・昼・晩)</option>
            <option value="2">2食分 (例: 昼・晩のみ)</option>
            <option value="1">1食分 (例: 晩のみ)</option>
        </select>
    </div>

    <button onclick="calculateDailyBudget()">予算を計算する</button>

    <div class="result-box" id="resultBox">
        <div class="result-item">
            <div class="result-title">1食あたりの平均予算</div>
            <div class="result-value"><span id="perMealBudget">0</span> 円</div>
        </div>
        
        <hr style="border: 0; border-top: 1px dashed #2ecc71; margin: 15px 0;">

        <div class="result-item">
            <div class="result-title">1日あたりの合計予算 (<span id="selectedMealsCount">3</span>食分)</div>
            <div class="result-value"><span id="dailyTotalBudget">0</span> 円</div>
            <div class="sub-text">※この金額の範囲で指定した食数をやりくりします</div>
        </div>
    </div>
</div>

<script>
    function isLeapYear(year) {
        // 4で割り切れる、かつ「100で割り切れない」または「400で割り切れる」
        return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
    }

    function calculateDailyBudget() {
        const budgetInput = document.getElementById('budget').value;
        const daysInMonth = parseInt(document.getElementById('month').value);
        const mealsPerDay = parseInt(document.getElementById('meals').value); // 追加：選択された食数
        const day = new Date();
        let leap = 0;

        if (!budgetInput || budgetInput <= 0) {
            alert('正しい予算を入力してください。');
            return;
        }

        if(daysInMonth == 28){
            if(isLeapYear(day.getFullYear)){
                leap = 1;
            }
        }
        const budget = parseFloat(budgetInput);

        // 1. まず「1ヶ月の総食数」を計算する (例: 30日 × 3食 = 90食)
        const totalMealsInMonth = (daysInMonth + leap) * mealsPerDay;

        // 2. 「1食あたり」の予算を計算（切り捨て）
        const perMealBudget = Math.floor(budget / totalMealsInMonth);

        // 3. 「1日あたり（設定した食数分）」の合計予算を計算
        const dailyTotalBudget = perMealBudget * mealsPerDay;

        // 結果を画面に反映
        document.getElementById('perMealBudget').innerText = perMealBudget.toLocaleString();
        document.getElementById('dailyTotalBudget').innerText = dailyTotalBudget.toLocaleString();
        document.getElementById('selectedMealsCount').innerText = mealsPerDay;
        
        // 結果ボックスを表示
        document.getElementById('resultBox').style.display = 'block';
    }
</script>

</body>
</html>
