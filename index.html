<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毎日の食費計算アプリ</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f3f6;
            color: #333;
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: #ffffff;
            padding: 24px 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(149, 157, 165, 0.15);
            width: 100%;
            max-width: 480px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 22px;
            text-align: center;
            margin-top: 0;
            margin-bottom: 24px;
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
            color: #4a5568;
        }

        input, select {
            width: 100%;
            height: 48px;
            padding: 0 14px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #fff;
            color: #333;
            appearance: none;
        }

        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '▼';
            font-size: 10px;
            color: #a0aec0;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2ecc71;
            background-color: #fafbfc;
        }

        .btn-calc {
            width: 100%;
            height: 52px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
            transition: background 0.2s, transform 0.1s;
        }
        .btn-calc:active {
            background-color: #27ae60;
            transform: scale(0.98); 
        }

        .btn-calendar {
            width: 100%;
            height: 48px;
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
            box-shadow: 0 4px 6px rgba(66, 133, 244, 0.2);
            transition: background 0.2s;
        }
        .btn-calendar:hover {
            background-color: #357ae8;
        }

        .result-box {
            margin-top: 24px;
            padding: 20px;
            background-color: #eafaf1;
            border-radius: 12px;
            text-align: center;
            display: none;
        }

        .result-item {
            margin-bottom: 12px;
        }

        .result-item:last-child {
            margin-bottom: 0;
        }

        .result-title {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 6px;
        }

        .result-value {
            font-size: 26px;
            font-weight: bold;
            color: #1e293b;
        }

        .sub-text {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
        }

        hr {
            border: 0;
            border-top: 1px dashed #a8e6cf;
            margin: 16px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>食費計算アプリ</h1>
    
    <div class="form-group">
        <label for="budget">今月の食費予算 (円)</label>
        <input type="number" id="budget" inputmode="numeric" placeholder="例: 40000" min="0">
    </div>

    <div class="form-group">
        <label for="month">計算したい月</label>
        <div class="select-wrapper">
            <select id="month">
                <option value="31" data-month="1">1月</option>
                <option value="28" data-month="2">2月</option>
                <option value="31" data-month="3">3月</option>
                <option value="30" data-month="4">4月</option>
                <option value="31" data-month="5">5月</option>
                <option value="30" data-month="6">6月</option>
                <option value="31" data-month="7">7月</option>
                <option value="31" data-month="8">8月</option>
                <option value="30" data-month="9">9月</option>
                <option value="31" data-month="10">10月</option>
                <option value="30" data-month="11">11月</option>
                <option value="31" data-month="12">12月</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="meals">1日あたり何食分を計算する？</label>
        <div class="select-wrapper">
            <select id="meals">
                <option value="3">3食すべて (朝・昼・晩)</option>
                <option value="2">2食分 (例: 昼・晩のみ)</option>
                <option value="1">1食分 (例: 晩のみ)</option>
            </select>
        </div>
    </div>

    <button class="btn-calc" onclick="calculateDailyBudget()">予算を計算する</button>

    <div class="result-box" id="resultBox">
        <div class="result-item">
            <div class="result-title">1食あたりの平均予算</div>
            <div class="result-value"><span id="perMealBudget">0</span> 円</div>
        </div>
        
        <hr>

        <div class="result-item">
            <div class="result-title">1日あたりの合計予算 (<span id="selectedMealsCount">3</span>食分)</div>
            <div class="result-value"><span id="dailyTotalBudget">0</span> 円</div>
            <div class="sub-text">※この金額の範囲で指定した食数をやりくりします</div>
        </div>

        <button class="btn-calendar" onclick="openGoogleCalendar()">Googleカレンダーに登録</button>
    </div>
</div>

<script>
    let calculatedDailyBudget = 0;
    let selectedMonthNum = 1;

    // 前に解説した、うるう年を判定する関数
    function isLeapYear(year) {
        return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
    }

    function calculateDailyBudget() {
        const budgetInput = document.getElementById('budget').value;
        const monthSelect = document.getElementById('month');
        
        // 選択された「基本の日数（30や31、2月なら28）」を取得
        let daysInMonth = parseInt(monthSelect.value);
        
        // カレンダー登録用に「何月か（1〜12）」も取得しておく
        const selectedOption = monthSelect.options[monthSelect.selectedIndex];
        selectedMonthNum = parseInt(selectedOption.getAttribute('data-month'));

        const mealsPerDay = parseInt(document.getElementById('meals').value);
        
        // --- いただいたコードの組み込みエリア ---
        const day = new Date();
        let leap = 0;

        if (!budgetInput || budgetInput <= 0) {
            alert('正しい予算を入力してください。');
            return;
        }

        if(daysInMonth == 28){
            // getFullYearに()を付けて、今年の西暦（2026など）を渡して判定
            if(isLeapYear(day.getFullYear())){
                leap = 1;
            }
        }
        // -----------------------------------------

        // 基本の日数に、うるう年の場合の1日（leap）をプラスする
        const finalDays = daysInMonth + leap;

        const budget = parseFloat(budgetInput);
        const totalMealsInMonth = finalDays * mealsPerDay; // finalDaysを使う
        const perMealBudget = Math.floor(budget / totalMealsInMonth);
        calculatedDailyBudget = perMealBudget * mealsPerDay;

        // 画面に反映
        document.getElementById('perMealBudget').innerText = perMealBudget.toLocaleString();
        document.getElementById('dailyTotalBudget').innerText = calculatedDailyBudget.toLocaleString();
        document.getElementById('selectedMealsCount').innerText = mealsPerDay;
        
        document.getElementById('resultBox').style.display = 'block';
    }

    function openGoogleCalendar() {
        const currentYear = new Date().getFullYear();
        const formattedMonth = String(selectedMonthNum).padStart(2, '0');
        const startDate = `${currentYear}${formattedMonth}01`;
        const endDate = `${currentYear}${formattedMonth}02`;

        const text = encodeURIComponent(`【食費予算】1日：${calculatedDailyBudget}円`);
        const dates = `${startDate}/${endDate}`;
        const details = encodeURIComponent(`今月の1日あたりの食費目安は ${calculatedDailyBudget} 円（1食あたり ${document.getElementById('perMealBudget').innerText} 円）です。`);

        const calendarUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${text}&dates=${dates}&details=${details}&sf=true&output=xml`;

        window.open(calendarUrl, '_blank');
    }
</script>

</body>
</html>
